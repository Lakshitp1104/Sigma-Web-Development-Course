<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css multicolor</title>
    <style>
        
        *{
          margin: 0;
          padding: 0;  
        }
        nav{
            background-color: burlywood;
            padding: 12px 0;
        }
        ul li{
            list-style: none;
            display: inline;
            padding: 23px;
            font-weight: bold;
            color: rgb(0, 0, 0);
        }
        ul li a{
            color: rgb(146, 6, 6);

        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a>Home</a></li>
                <li><a>About</a></li>
                <li><a>Services</a></li>
                <li><a>Contact us</a></li>
            </ul>
        </nav>
    </header>
</body>
</html>
