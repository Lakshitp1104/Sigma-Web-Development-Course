<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS object fit and position</title>
    <style>
       .container {
        height: 450px;
        width: 430px;
        border: 2px solid black;
        background-color: burlywood;
        background-position: center center;
        background-clip: border-box;
        background-image: url(https://images.unsplash.com/photo-1602922960044-d48ce791d3c0?q=80&w=865&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
    
        }

        img {
            height: 450px;
            width: 430px;
            /* object-fit: contain; */
            object-fit: cover;
            }
    </style>
</head>
<body>
    <div class="container">
    <img src="" alt="">
    </div>
</body>
</html>
