<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS selectors</title>
</head>
<style>
    /* background color */
    div{
        background-color: red;
    }

    /* class selector */
.mydiv{
    background-color: red;
}

/* ID selector */
#mydiv{
    background-color: blue;
}

/* child selector */
.mydiv > p{
    color: white;
    background-color: black;
}
/* descendant selector */
.mydiv p{
    color: white;
    background-color: black;
}
/* universal selector */
*{
    margin: 0;
    padding: 0;
}
/* pseudo   selector */
a:visited{
    color: green;
}
a:link{
    color: red;
}
a:hover{
    color: blue;
}   
a:active{
    color: yellow;
}
p:first-child{
    color: red;
}
</style>
<body>
    <main>
        <p>i am first </p>
        <p>i am second </p>
    </main>
    <div  class="mydiv">
        i am a div  
        <p>i am a paragraph</p>
    </div>
    <div id="mydiv">
        i am another div  
    </div>
    <a href="http://google.com">Google</a>
    <a href="http://facebook.com">facebook</a>
</body>
</html>
