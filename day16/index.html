<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Boxmodel</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    .box {
      background-color: rgb(65, 61, 61);
    }
    .box1{
        color: rgb(126, 247, 132);
        padding: 10px;
        margin: 25px;
        border: 3px solid rgb(240, 0, 0);
        height: 200px;
        box-sizing: border-box;
    }
    .box2 {
       color: lightblue;
        padding: 10px;
        margin: 25px;
        border: 3px solid rgb(240, 0, 0);
        height: 200px;
        box-sizing: border-box;
    }
  </style>
  <body>
    <div class="box box1">I am box</div>
    <div class="box box2">I am also a box</div>
  </body>
</html>
