        .boxes::before{
            content: "hii";
            color: blueviolet;

        .boxes::after{
            content: "byy!!";
            color: darkolivegreen;
        }
        ::selection{
            background-color: aqua;
            color: darkorange;
        }

        .box::first-letter{
            color: darkblue;
        }

        input::placeholder{
            color: coral;
        }

      <div class="box">heyy im a box</div>
