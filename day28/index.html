<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS media query</title>
    <style>
        body{
            background-color: red;

        }
        @media only screen  and (max-width:155px){
            body{
                background-color: blue;
            }
            .boxes{
                flex-direction: column;
            }
        }
        .boxes{
            display: flex;
        }
        .box{
            width: 144px;
            height: 144px;
            background-color: blueviolet;
            padding: 2px;
            margin: 3px;
        }

    </style>
</head>
<body>
    <div>
        hey I m red body guy !!!
    </div>
    <div class="boxes">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
</body>
</html>
